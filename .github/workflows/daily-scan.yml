name: Daily bug scan (reusable)

on:
  workflow_call:
    inputs:
      scan-scope:
        description: "changed-7d | full | rotating"
        required: false
        type: string
        default: "changed-7d"
      enable-auto-pr:
        description: "If true, agent may open draft PRs to fix issues — but only if it discovers a validation strategy in the repo. If false, issues only."
        required: false
        type: boolean
        default: false
      model:
        description: "Model id. If empty, defaults per provider (anthropic: claude-sonnet-4-6, openai: gpt-5)."
        required: false
        type: string
        default: ""
      provider:
        description: "Which agent provider to use: anthropic | openai"
        required: false
        type: string
        default: "anthropic"
      label:
        description: "Label applied to all bot-created issues/PRs"
        required: false
        type: string
        default: "auto:bug-scan"
      validate-command:
        description: "Optional override. If set, agent uses this exact command before opening any PR. If empty, agent discovers from package.json/Makefile/etc."
        required: false
        type: string
        default: ""
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: daily-scan-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 30

      - name: Checkout hub repo (for prompt)
        uses: actions/checkout@v4
        with:
          repository: Fralleee/agent-workflows
          # Always grab the latest prompt from main. github.workflow_sha would
          # be ideal in theory (pin to the same hub SHA as the workflow being
          # run), but in a reusable-workflow context it points at the caller's
          # SHA, which doesn't exist on this repo and causes "not our ref".
          ref: main
          path: .agent-workflows
          fetch-depth: 1

      - name: Detect package manager
        id: detect-pm
        shell: bash
        run: |
          if [ -f bun.lockb ] || [ -f bun.lock ]; then
            pm=bun
          elif [ -f pnpm-lock.yaml ]; then
            pm=pnpm
          elif [ -f yarn.lock ]; then
            pm=yarn
          elif [ -f package-lock.json ]; then
            pm=npm
          else
            pm=none
          fi
          echo "pm=$pm" >> "$GITHUB_OUTPUT"
          echo "Detected package manager: $pm"

      - name: Set up Bun
        if: steps.detect-pm.outputs.pm == 'bun'
        uses: oven-sh/setup-bun@v2

      - name: Set up Node
        if: steps.detect-pm.outputs.pm != 'bun'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: ${{ steps.detect-pm.outputs.pm != 'none' && steps.detect-pm.outputs.pm || '' }}

      - name: Enable corepack (pnpm/yarn)
        if: steps.detect-pm.outputs.pm == 'pnpm' || steps.detect-pm.outputs.pm == 'yarn'
        run: corepack enable

      - name: Validate provider secret
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          case "${{ inputs.provider }}" in
            anthropic)
              if [ -z "$ANTHROPIC_API_KEY" ]; then
                echo "::error::provider=anthropic but ANTHROPIC_API_KEY secret is not set."
                exit 1
              fi
              ;;
            openai)
              if [ -z "$OPENAI_API_KEY" ]; then
                echo "::error::provider=openai but OPENAI_API_KEY secret is not set."
                exit 1
              fi
              ;;
            *)
              echo "::error::Unknown provider '${{ inputs.provider }}'. Use 'anthropic' or 'openai'."
              exit 1
              ;;
          esac

      # We invoke the agent CLIs directly rather than via the upstream
      # GitHub Actions (anthropics/claude-code-action, openai/codex-action)
      # because those actions require their own GitHub Apps installed on
      # every consumer repo for OIDC-based auth. With direct CLI invocation,
      # the API key alone is sufficient — no extra Apps needed.
      - name: Run Claude Code agent (Anthropic)
        if: inputs.provider == 'anthropic'
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_SCAN_SCOPE: ${{ inputs.scan-scope }}
          INPUT_ENABLE_AUTO_PR: ${{ inputs.enable-auto-pr }}
          INPUT_LABEL: ${{ inputs.label }}
          INPUT_VALIDATE_COMMAND: ${{ inputs.validate-command }}
          INPUT_PACKAGE_MANAGER: ${{ steps.detect-pm.outputs.pm }}
        run: |
          set -euo pipefail
          git config --global user.email "agent-workflows[bot]@users.noreply.github.com"
          git config --global user.name "agent-workflows[bot]"
          npm install -g @anthropic-ai/claude-code
          MODEL="${{ inputs.model != '' && inputs.model || 'claude-sonnet-4-6' }}"
          claude \
            --print \
            --model "$MODEL" \
            --allowed-tools "Read,Grep,Glob,Bash" \
            --permission-mode bypassPermissions \
            < .agent-workflows/prompts/daily-scan.md

      - name: Run Codex agent (OpenAI)
        if: inputs.provider == 'openai'
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_SCAN_SCOPE: ${{ inputs.scan-scope }}
          INPUT_ENABLE_AUTO_PR: ${{ inputs.enable-auto-pr }}
          INPUT_LABEL: ${{ inputs.label }}
          INPUT_VALIDATE_COMMAND: ${{ inputs.validate-command }}
          INPUT_PACKAGE_MANAGER: ${{ steps.detect-pm.outputs.pm }}
        run: |
          set -euo pipefail
          git config --global user.email "agent-workflows[bot]@users.noreply.github.com"
          git config --global user.name "agent-workflows[bot]"
          npm install -g @openai/codex
          MODEL="${{ inputs.model != '' && inputs.model || 'gpt-5' }}"
          codex exec \
            --model "$MODEL" \
            --sandbox workspace-write \
            < .agent-workflows/prompts/daily-scan.md
