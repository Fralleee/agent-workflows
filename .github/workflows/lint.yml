name: Lint workflows

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "installer/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "installer/**"
  workflow_dispatch:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        uses: raven-actions/actionlint@v2
        with:
          fail-on-error: true

  installer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: installer
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
