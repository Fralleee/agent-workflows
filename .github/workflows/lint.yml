name: Lint workflows

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "scripts/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "scripts/**"
  workflow_dispatch:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        uses: raven-actions/actionlint@v2
        with:
          fail-on-error: true

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: shellcheck scripts/*.sh
